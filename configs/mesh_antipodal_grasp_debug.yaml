geometry:
  type: cube
  cube_side: 0.05
  cylinder_radius: 0.02
  cylinder_height: 0.05
  cylinder_segments: 24
  stl_path: null
  stl_scale: 1.0

generator:
  num_samples: 200
  min_jaw_width: 0.02
  max_jaw_width: 0.08
  antipodal_cosine_threshold: 0.94
  # Roll samples are generated as 0, step, 2*step, ... up to but excluding 360.
  # 360 means "only 0 deg".
  roll_step_deg: 36
  max_pair_checks: 40960
  detailed_finger_contact_gap_m: 0.002
  rng_seed: 0

output_html: artifacts/mesh_antipodal_grasp_debug.html
