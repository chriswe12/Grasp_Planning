geometry:
  target_mesh_path: "obj/fabrica/plumbers_block/0.obj"
  mesh_scale: 0.01
  assembly_glob: "obj/fabrica/plumbers_block/*.obj"

planning:
  num_surface_samples: 2560
  min_jaw_width: 0.002
  max_jaw_width: 0.09
  antipodal_cosine_threshold: 0.984807753012208
  roll_angle_step_deg: 15.0
  max_pair_checks: 10960
  detailed_finger_contact_gap_m: 0.002
  floor_clearance_margin_m: 0.01
  top_grasp_score_weight: 0.35
  contact_lateral_offsets_m: [-0.005833333333333334, -0.002916666666666667, 0.0, 0.002916666666666667, 0.005833333333333334]
  contact_approach_offsets_m: [-0.006166666666666667, -0.0030833333333333333, 0.0, 0.0030833333333333333, 0.006166666666666667]
  rng_seed: 0

artifacts:
  stage1_json: "artifacts/pitl_pipeline_stage1_assembly_grasps.json"
  stage1_html: "artifacts/pitl_pipeline_stage1_assembly_grasps.html"
  stage2_json: "artifacts/pitl_pipeline_stage2_ground_feasible.json"
  stage2_html: "artifacts/pitl_pipeline_stage2_ground_feasible.html"
  part_frame_html: "artifacts/pitl_pipeline_part_frame_debug.html"

mujoco_execution:
  enabled: true
  python_executable: ""
  robot_config: "configs/mujoco_fr3_with_hand.json"
  simulation_config: "configs/mujoco_simulation.yaml"
  controller: "moveit"  # set to "moveit" to plan MuJoCo arm trajectories with MoveIt
  grasp_id: ""
  attempt_artifact: "artifacts/pitl_mujoco_pick_attempt.json"
  viewer: true
  viewer_left_ui: false
  viewer_right_ui: false
  viewer_no_realtime: false
  viewer_hold_seconds: 8.0
  viewer_block_at_end: false
  keep_generated_scene: false
  moveit_frame_id: "base"
  moveit_planning_group: "fr3_arm"
  moveit_pose_link: "fr3_hand_tcp"
  moveit_planner_id: ""
  moveit_wait_for_moveit_timeout_s: 15.0
  moveit_ik_timeout_s: 2.0
  moveit_planning_time_s: 5.0
  moveit_num_planning_attempts: 5
  moveit_velocity_scale: 0.05
  moveit_acceleration_scale: 0.05
  moveit_execute_timeout_s: 120.0
  moveit_allow_collisions: false

isaac_execution:
  enabled: false
  python_executable: "/isaac-sim/python.sh"
  part_usd: ""  # optional; runner generates a bundle-local USD by default
  fr3_usd: ""
  controller: "admittance"
  grasp_id: ""
  pregrasp_offset: 0.02
  gripper_width_clearance: 0.01
  contact_gap_m: 0.002
  close_width: 0.0
  tcp_to_grasp_offset: [0.0, 0.0, 0.0]
  attempt_artifact: "artifacts/pitl_isaac_pick_attempt.json"
  pregrasp_only: false
  run_seconds: 0.0
  headless: false

ros2:
  debug_frame_topic: "/perception/fp/debug_frame/zed2i_2"
  object_id: "pb_pipe"
  frame_id: "world"
  timeout_s: 10.0
