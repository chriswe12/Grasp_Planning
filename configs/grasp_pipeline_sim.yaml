geometry:
  target_mesh_path: "obj/fabrica/beam/2.obj"
  mesh_scale: 0.01
  assembly_glob: "obj/fabrica/beam/*.obj"

planning:
  num_surface_samples: 256
  min_jaw_width: 0.002
  max_jaw_width: 0.09
  antipodal_cosine_threshold: 0.984807753012208
  roll_angles_rad: [0.0]
  max_pair_checks: 40960
  detailed_finger_contact_gap_m: 0.002
  contact_lateral_offsets_m: [-0.005833333333333334, -0.002916666666666667, 0.0, 0.002916666666666667, 0.005833333333333334]
  contact_approach_offsets_m: [-0.006166666666666667, -0.0030833333333333333, 0.0, 0.0030833333333333333, 0.006166666666666667]
  rng_seed: 0

execution_world_pose:
  position_world: [0.5, 0.0, 0.007]
  orientation_xyzw_world: [0.0, 0.70710678, 0.0, 0.70710678]

artifacts:
  stage1_json: "artifacts/pipeline_stage1_assembly_grasps.json"
  stage1_html: "artifacts/pipeline_stage1_assembly_grasps.html"
  stage2_json: "artifacts/pipeline_stage2_ground_feasible.json"
  stage2_html: "artifacts/pipeline_stage2_ground_feasible.html"

mujoco_execution:
  enabled: true
  python_executable: ""
  robot_config: "configs/mujoco_fr3_with_hand.json"
  simulation_config: "configs/mujoco_simulation.yaml"
  grasp_id: ""
  attempt_artifact: "artifacts/sim_mujoco_pick_attempt.json"
  viewer: true
  viewer_left_ui: false
  viewer_right_ui: false
  viewer_no_realtime: false
  viewer_hold_seconds: 8.0
  viewer_block_at_end: false
  keep_generated_scene: false

ros2:
  debug_frame_topic: "/perception/fp/debug_frame/zed2i_2"
  object_id: ""
  frame_id: "world"
  timeout_s: 10.0
