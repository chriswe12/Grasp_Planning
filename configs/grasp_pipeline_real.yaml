geometry:
  target_mesh_path: "obj/fabrica/beam/2.obj"
  mesh_scale: 0.01
  assembly_glob: "obj/fabrica/beam/*.obj"

planning:
  num_surface_samples: 256
  min_jaw_width: 0.002
  max_jaw_width: 0.09
  antipodal_cosine_threshold: 0.984807753012208
  roll_angles_rad: [0.0]
  max_pair_checks: 40960
  detailed_finger_contact_gap_m: 0.002
  contact_lateral_offsets_m: [-0.005833333333333334, -0.002916666666666667, 0.0, 0.002916666666666667, 0.005833333333333334]
  contact_approach_offsets_m: [-0.006166666666666667, -0.0030833333333333333, 0.0, 0.0030833333333333333, 0.006166666666666667]
  rng_seed: 0

artifacts:
  stage1_json: "artifacts/real_pipeline_stage1_assembly_grasps.json"
  stage1_html: "artifacts/real_pipeline_stage1_assembly_grasps.html"
  stage2_json: "artifacts/real_pipeline_stage2_ground_feasible.json"
  stage2_html: "artifacts/real_pipeline_stage2_ground_feasible.html"

mujoco_execution:
  enabled: false
  python_executable: ""
  robot_config: "configs/mujoco_fr3_with_hand.json"
  simulation_config: "configs/mujoco_simulation.yaml"
  grasp_id: ""
  attempt_artifact: "artifacts/real_mujoco_pick_attempt.json"
  viewer: false
  viewer_left_ui: false
  viewer_right_ui: false
  viewer_no_realtime: false
  viewer_hold_seconds: 8.0
  viewer_block_at_end: false
  keep_generated_scene: false

ros2:
  debug_frame_topic: "/perception/fp/debug_frame/zed2i_2"
  object_id: ""  # required: matching pose_items.object_id
  frame_id: "world"
  timeout_s: 10.0

real_execution:
  enabled: false
  grasp_id: ""
  attempt_artifact: "artifacts/real_robot_pick_attempt.json"
  planning_group: "fr3_arm"
  pose_link: "fr3_hand_tcp"
  frame_id: "base"
  wait_for_moveit_timeout_s: 15.0
  ik_timeout_s: 2.0
  planning_time_s: 5.0
  num_planning_attempts: 5
  velocity_scale: 0.05
  acceleration_scale: 0.05
  execute_timeout_s: 120.0
  post_execute_sleep_s: 0.5
  pregrasp_offset_m: 0.10
  gripper_width_clearance_m: 0.01
  lift_height_m: 0.08
  require_confirmation: true
  stop_after: "pregrasp"
  allow_collisions: false
  gripper_enabled: false
  gripper_grasp_action: "/fr3_gripper/grasp"
  gripper_move_action: "/fr3_gripper/move"
  gripper_open_width: 0.08
  gripper_grasp_speed: 0.03
  gripper_grasp_force: 30.0
  gripper_epsilon_inner: 0.002
  gripper_epsilon_outer: 0.08
  gripper_timeout_s: 10.0
  grasp_settle_time_s: 0.5
