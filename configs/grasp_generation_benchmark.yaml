target_root: "obj/fabrica"

benchmark:
  output_dir: "artifacts/grasp_generation_benchmark"

stable_orientations:
  robust_tilt_deg: 5.0
  min_support_area_m2: 0.000001
  min_support_area_fraction: 0.01
  coplanar_tolerance_m: 0.000001
  xy_world: [0.0, 0.0]

planning:
  stage1_cache_enabled: true
  stage1_cache_dir: "artifacts/grasp_generation_benchmark/stage1_cache"
  num_surface_samples: 256
  min_jaw_width: 0.002
  max_jaw_width: 0.09
  antipodal_cosine_threshold: 0.984807753012208
  roll_angle_step_deg: 15.0
  max_pair_checks: 40960
  detailed_finger_contact_gap_m: 0.002
  floor_clearance_margin_m: 0.01
  top_grasp_score_weight: 0.35
  regrasp_transfer_top_grasp_score_weight: 0.85
  contact_lateral_offsets_m: [-0.005833333333333334, -0.002916666666666667, 0.0, 0.002916666666666667, 0.005833333333333334]
  contact_approach_offsets_m: [-0.006166666666666667, -0.0030833333333333333, 0.0, 0.0030833333333333333, 0.006166666666666667]
  rng_seed: 0

geometry:
  mesh_scale: 0.01

fallback:
  enabled: true
  yaw_angles_deg: [0.0]
  max_orientations: 24
  max_placement_options: 18
  min_facet_area_m2: 0.000001
  stability_margin_m: 0.0
  coplanar_tolerance_m: 0.000001
  staging_xy_offsets_m:
    - [0.0, 0.0]
